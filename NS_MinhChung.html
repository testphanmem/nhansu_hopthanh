<style>
  /* Z-index: 999999 siêu cao, bảo vệ lệnh không bị Modal Đánh giá che khuất */
  #upload_modal_cv { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 999999 !important; justify-content: center; align-items: center; }
  .up-container { background: #fff; padding: 20px; border-radius: 8px; width: 450px; max-width: 95%; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-family: 'Times New Roman', serif; }
  .up-header { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; text-align: center; }
  .up-box { margin-bottom: 15px; }
  .up-dropzone { border: 2px dashed #ccc; padding: 20px; text-align: center; cursor: pointer; border-radius: 6px; transition: 0.3s; background: #fafafa; }
  .up-dropzone:hover { border-color: #0891b2; background: #f0f9ff; }
  .close-up { width: 100%; padding: 10px; background: #64748b; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
  .close-up:hover { background: #475569; }
  .btn-create-folder { border: 1px solid #ccc; background: #f0fdf4; color: #16a34a; width: 40px; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 18px; margin-left: 5px; }
  
  #warnDeleteCV { display:none; color:#d97706; font-size:13px; text-align:center; margin-bottom:10px; font-weight:bold; background: #fffbeb; padding: 8px; border-radius: 4px; border: 1px dashed #d97706; }
</style>

<div id="upload_modal_cv">
  <div class="up-container">
    <div class="up-header"><h2 style="margin:0; color:#b91c1c;" id="tdeModalCV">📁 VĂN BẢN KÈM THEO</h2></div>
    
    <div class="up-box" id="vungChonThuMuc">
       <label><b>1. Thư mục lưu trữ:</b></label>
       <div style="display:flex; gap:5px; margin-top:5px;">
           <select id="folderSelectCV" style="flex:1; padding:8px; border:1px solid #ccc; border-radius:4px;"><option>⏳ Đang kết nối...</option></select>
           <button class="btn-create-folder" onclick="toggleNewFolderUI()" title="Tạo thư mục con mới">➕</button>
       </div>
       <div id="newFolderArea" style="display:none; margin-top:8px; background:#f9fafb; padding:10px; border:1px solid #e5e7eb; border-radius:4px;">
           <label style="font-size:13px; font-weight:bold; color:#065f46;">Tên thư mục mới:</label>
           <div style="display:flex; gap:5px; margin-top:5px;">
               <input type="text" id="txtNewFolderName" placeholder="Ví dụ: Tháng 03/2026" style="flex:1; padding:6px; border:1px solid #ccc; border-radius:4px;">
               <button onclick="doCreateNewFolder()" style="background:#059669; color:white; border:none; padding:6px 10px; border-radius:4px; cursor:pointer;">Tạo</button>
               <button onclick="toggleNewFolderUI()" style="background:#ef4444; color:white; border:none; padding:6px 10px; border-radius:4px; cursor:pointer;">Hủy</button>
           </div>
       </div>
    </div>

    <div class="up-box">
      <label style="display:block; margin-bottom:5px;"><b>Chọn phương thức đính kèm:</b></label>
      <div style="display:flex; gap:15px; justify-content:center; margin-bottom:10px; font-weight:bold; flex-wrap: wrap;" id="vungLuaChonMode">
        <label id="modeFile"><input type="radio" name="upModeCV" value="file" checked onchange="toggleUpModeCV()"> 📄 Tải File lẻ</label>
        <label id="modeFolder"><input type="radio" name="upModeCV" value="folder" onchange="toggleUpModeCV()"> 📂 Cả thư mục</label>
        <label id="modeLink" style="color: #047857;"><input type="radio" name="upModeCV" value="link" onchange="toggleUpModeCV()"> 🔗 Gán link Web/Drive</label>
      </div>
      
      <div style="display:flex; gap:20px; justify-content:center; padding:8px; background:#e0f2fe; border-radius:6px; margin-bottom:10px; font-size: 14px;">
        <label style="color:#0369a1; cursor:pointer;"><input type="radio" name="writeMode" value="replace" checked onchange="updateWarnDisplayCV()"> 🔄 Thay thế cũ</label>
        <label style="color:#0369a1; cursor:pointer;"><input type="radio" name="writeMode" value="append" onchange="updateWarnDisplayCV()"> ➕ Chèn thêm</label>
      </div>
      
      <div class="up-dropzone" id="dropzoneAreaCV" onclick="document.getElementById('fileInCV').click()">
        <span id="fileLabelCV">Nhấn vào đây để chọn file</span>
        <input type="file" id="fileInCV" style="display:none" onchange="fileSelCV(this)" multiple>
      </div>

      <div id="linkInputAreaCV" style="display:none; text-align: left;">
          <input type="text" id="txtDirectLinkCV" placeholder="Dán đường link (Drive/Web/PDF...) vào đây..." style="width:100%; padding:10px; border:1px solid #ccc; border-radius:6px; font-family: Arial, sans-serif;" oninput="checkDirectLinkCV()">
          <div style="font-size:12px; color:#666; margin-top:5px; font-style: italic;">* Lưu ý: AI chỉ đọc được link công khai hoặc link Google Drive đã mở quyền.</div>
      </div>
    </div>

    <div id="warnDeleteCV">⚠️ Tài liệu/Liên kết cũ sẽ bị thay thế.</div>
    <div id="upStatusCV" style="text-align:center; font-weight:bold; min-height:20px; color:#333;"></div>
    
    <div style="margin-top:10px;">
      <button id="uploadBtnCV" style="width: 100%; padding: 12px; background: #0891b2; color: white; border: none; font-weight: bold; border-radius: 6px; cursor: pointer;" onclick="doUploadCV()">LƯU KẾT QUẢ</button>
      <button class="close-up" onclick="closeUploadModalCV()">ĐÓNG</button>
    </div>
  </div>
</div>

<script>
    let GLOBAL_BTN_TRIGGER = null; 
    let FILES_CV = [];
    let LINK_CAN_XOA_CV = ""; 
    let CURRENT_ROOT_ID = ""; 

    function SCV_OpenUploadModal(btnElement, currentLink, rootId, onlyLink = false) {
        try {
            GLOBAL_BTN_TRIGGER = btnElement;
            LINK_CAN_XOA_CV = currentLink || "";
            CURRENT_ROOT_ID = rootId || ""; 
            
            if(document.getElementById('upStatusCV')) document.getElementById('upStatusCV').innerText = "";
            if(document.getElementById('fileInCV')) document.getElementById('fileInCV').value = "";
            if(document.getElementById('txtDirectLinkCV')) document.getElementById('txtDirectLinkCV').value = "";
            FILES_CV = [];

            if(onlyLink) {
                let tde = document.getElementById('tdeModalCV'); if(tde) tde.innerText = "🔗 MINH CHỨNG LINK";
                let vChon = document.getElementById('vungChonThuMuc'); if(vChon) vChon.style.display = 'none';
                let mFile = document.getElementById('modeFile'); if(mFile) mFile.style.display = 'none';
                let mFold = document.getElementById('modeFolder'); if(mFold) mFold.style.display = 'none';
                let rdLink = document.querySelector('input[name="upModeCV"][value="link"]');
                if(rdLink) rdLink.checked = true;
            } else {
                let tde = document.getElementById('tdeModalCV'); if(tde) tde.innerText = "📁 VĂN BẢN KÈM THEO";
                let vChon = document.getElementById('vungChonThuMuc'); if(vChon) vChon.style.display = 'block';
                let mFile = document.getElementById('modeFile'); if(mFile) mFile.style.display = 'inline-block';
                let mFold = document.getElementById('modeFolder'); if(mFold) mFold.style.display = 'inline-block';
                let rdFile = document.querySelector('input[name="upModeCV"][value="file"]');
                if(rdFile) rdFile.checked = true;
            }

            toggleUpModeCV();
            updateWarnDisplayCV();
            
            // Ép buộc giao diện hiển thị ưu tiên cao nhất
            let uiCV = document.getElementById('upload_modal_cv');
            if(uiCV) {
                uiCV.style.setProperty('display', 'flex', 'important');
                uiCV.style.zIndex = "999999"; 
            }
            if(!onlyLink) loadFoldersCV();
        } catch(e) {
            alert("Lỗi khởi tạo UI Minh Chứng: " + e.message);
        }
    }

    function updateWarnDisplayCV() {
        let wrn = document.querySelector('input[name="writeMode"]:checked');
        if(!wrn) return;
        const wMode = wrn.value;
        const warnDiv = document.getElementById('warnDeleteCV');
        if(warnDiv) warnDiv.style.display = (wMode === 'replace' && LINK_CAN_XOA_CV) ? 'block' : 'none';
    }

    function toggleUpModeCV() {
       let md = document.querySelector('input[name="upModeCV"]:checked');
       if(!md) return;
       const mode = md.value;
       const btn = document.getElementById('uploadBtnCV');
       const dropzone = document.getElementById('dropzoneAreaCV');
       const linkArea = document.getElementById('linkInputAreaCV');

       if (mode === 'link') {
           if(dropzone) dropzone.style.display = 'none'; 
           if(linkArea) linkArea.style.display = 'block';
           if(btn) { btn.innerText = "LƯU ĐƯỜNG LINK"; btn.style.background = "#047857"; }
           checkDirectLinkCV();
       } else {
           if(dropzone) dropzone.style.display = 'block'; 
           if(linkArea) linkArea.style.display = 'none';
           if(btn) { btn.innerText = "TẢI LÊN NGAY"; btn.style.background = "#0891b2"; btn.style.opacity = 0.5; btn.style.pointerEvents = "none"; }
       }
    }

    function checkDirectLinkCV() {
        let el = document.getElementById('txtDirectLinkCV');
        if(!el) return;
        const val = el.value.trim();
        const btn = document.getElementById('uploadBtnCV');
        if(btn) {
            btn.style.opacity = (val !== "") ? 1 : 0.5;
            btn.style.pointerEvents = (val !== "") ? "auto" : "none";
        }
    }

    function fileSelCV(input) {
       if (input.files.length > 0) {
         FILES_CV = input.files;
         let lbl = document.getElementById('fileLabelCV');
         if(lbl) lbl.innerText = `📄 Đã chọn ${FILES_CV.length} tệp`;
         let btn = document.getElementById('uploadBtnCV');
         if(btn) { btn.style.opacity = 1; btn.style.pointerEvents = "auto"; }
       }
    }

    function doUploadCV() {
       let md = document.querySelector('input[name="upModeCV"]:checked');
       let wmd = document.querySelector('input[name="writeMode"]:checked');
       if(!md || !wmd) return;
       
       const mode = md.value;
       const wMode = wmd.value;
       const st = document.getElementById('upStatusCV');
       
       if (mode === 'link') {
           let dl = document.getElementById('txtDirectLinkCV');
           if(!dl) return;
           const linkVal = dl.value.trim();
           if (!linkVal) return;
           
           if(st) st.innerText = "⏳ Đang xử lý...";
           let finalLink = (wMode === 'append' && LINK_CAN_XOA_CV) ? LINK_CAN_XOA_CV + "," + linkVal : linkVal;
           
           handleUpResultCV({ success: true, fileUrl: finalLink, message: "Đã cập nhật link thành công!" }, st);
           return;
       }
    }

    function handleUpResultCV(res, st) {
       if (res.success) { 
           if(st) { st.style.color = "green"; st.innerText = "✅ " + res.message; }
           if (GLOBAL_BTN_TRIGGER) {
               const modal = document.getElementById('hopThoaiDg');
               if(modal) {
                   const inputLink = modal.querySelector('.val-link');
                   if(inputLink) inputLink.value = res.fileUrl;
               }
               if(typeof veGhimModal === 'function') veGhimModal(res.fileUrl);
           }
           setTimeout(closeUploadModalCV, 800);
       }
    }

    function closeUploadModalCV() { 
        let ui = document.getElementById('upload_modal_cv');
        if(ui) ui.style.setProperty('display', 'none', 'important'); 
    }
    
    function loadFoldersCV() { /* Hàm cũ */ }
    function toggleNewFolderUI() { /* Hàm cũ */ }
    function doCreateNewFolder() { /* Hàm cũ */ }
</script>
