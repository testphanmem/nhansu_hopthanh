<div class="tab-pane fade" id="muc4">
  <div class="d-flex justify-content-between align-items-center mb-3 mt-2">
    <button class="btn btn-primary fw-bold" onclick="moThemTaiKhoan()"><i class="fas fa-plus"></i> Thêm tài khoản</button>
    <button class="btn btn-success fw-bold" onclick="capNhatPhanQuyen()"><i class="fas fa-save"></i> Cập nhật hệ thống</button>
  </div>
  
  <div class="table-responsive bg-white rounded shadow-sm border p-2">
    <table class="table table-bordered table-hover bangTchinh" id="bangPhanQuyen">
      <thead>
        <tr>
          <th style="width: 50px;">Sửa</th>
          <th style="width: 50px;">STT</th>
          <th>Địa chỉ</th>
          <th>Họ và tên</th>
          <th>Quyền</th>
        </tr>
      </thead>
      <tbody>
        </tbody>
    </table>
  </div>
</div>

<div class="modal fade" id="modalPhanQuyen" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header bg-primary text-white py-2">
        <h5 class="modal-title fw-bold" id="tdeModalPq">Thêm tài khoản</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <input type="hidden" id="pq_chiSoSua" value="-1">
        <div class="mb-3">
          <label class="form-label fw-bold">Địa chỉ (Email) <span class="text-danger">*</span></label>
          <input type="email" class="form-control" id="pq_diaChi" placeholder="VD: ngvna@gmail.com">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Họ và tên <span class="text-danger">*</span></label>
          <input type="text" class="form-control" id="pq_hoTen" placeholder="VD: Nguyễn Văn A">
        </div>
        <div class="mb-3">
          <label class="form-label fw-bold">Quyền hạn <span class="text-danger">*</span></label>
          <select class="form-select" id="pq_quyen">
            <option value="x">Giáo viên (x)</option>
            <option value="xx">Quản trị viên (xx)</option>
          </select>
        </div>
      </div>
      <div class="modal-footer py-2 border-0 justify-content-center">
        <button type="button" class="btn btn-secondary px-4" data-bs-dismiss="modal">Hủy</button>
        <button type="button" class="btn btn-primary px-4" onclick="luuTamTaiKhoan()">Lưu tạm</button>
      </div>
    </div>
  </div>
</div>

<script>
  let mangPhanQuyen = [];

  function taiDsPhanQuyen() {
    if (!ndHtai || ndHtai.vTro !== 'qtriv') return;
    $("#vungTai").show();
    
    goiMyChuHien('layDsTaiKhoan', { vTro: ndHtai.vTro })
      .then(q => {
        if (q.tCong) {
          mangPhanQuyen = q.dLieu || [];
          veBangPhanQuyen();
        } else {
          hienTbao(q.tBao, 'loi');
        }
        $("#vungTai").hide();
      })
      .catch(lc => { hienTbao(lc, 'loi'); $("#vungTai").hide(); });
  }

  function veBangPhanQuyen() {
    let html = '';
    if (mangPhanQuyen.length === 0) {
      html = '<tr><td colspan="5" class="text-center text-muted py-3">Chưa có dữ liệu.</td></tr>';
    } else {
      mangPhanQuyen.forEach((tk, i) => {
        let tenQuyen = (tk[2] === 'xx') ? '<span class="badge bg-danger">Quản trị viên</span>' : '<span class="badge bg-secondary">Giáo viên</span>';
        html += `<tr>
          <td><button class="btn btn-sm btn-outline-primary" onclick="moSuaTaiKhoan(${i})"><i class="fas fa-edit"></i></button></td>
          <td class="text-center">${i + 1}</td>
          <td class="text-start">${tk[0]}</td>
          <td class="text-start fw-bold text-primary">${tk[1]}</td>
          <td class="text-center">${tenQuyen}</td>
        </tr>`;
      });
    }
    $("#bangPhanQuyen tbody").html(html);
  }

  function moThemTaiKhoan() {
    $("#tdeModalPq").text("Thêm tài khoản");
    $("#pq_chiSoSua").val(-1);
    $("#pq_diaChi").val('');
    $("#pq_hoTen").val('');
    $("#pq_quyen").val('x');
    new bootstrap.Modal(document.getElementById('modalPhanQuyen')).show();
  }

  function moSuaTaiKhoan(i) {
    $("#tdeModalPq").text("Sửa tài khoản");
    $("#pq_chiSoSua").val(i);
    $("#pq_diaChi").val(mangPhanQuyen[i][0]);
    $("#pq_hoTen").val(mangPhanQuyen[i][1]);
    $("#pq_quyen").val(mangPhanQuyen[i][2]);
    new bootstrap.Modal(document.getElementById('modalPhanQuyen')).show();
  }

  function luuTamTaiKhoan() {
    let dChi = $("#pq_diaChi").val().trim();
    let hTen = $("#pq_hoTen").val().trim();
    let quyen = $("#pq_quyen").val();
    let cs = parseInt($("#pq_chiSoSua").val());

    if (dChi === '' || hTen === '') {
      hienTbao('Vui lòng điền đầy đủ Địa chỉ và Họ tên!', 'loi');
      return;
    }

    // Bắt buộc: Không cho phép trùng Họ và tên
    let trungTen = mangPhanQuyen.some((tk, i) => i !== cs && tk[1].toLowerCase() === hTen.toLowerCase());
    if (trungTen) {
      hienTbao('Họ và tên đã tồn tại trong danh sách. Không cho phép trùng lặp!', 'loi');
      return;
    }

    if (cs === -1) {
      mangPhanQuyen.push([dChi, hTen, quyen]);
    } else {
      mangPhanQuyen[cs] = [dChi, hTen, quyen];
    }

    veBangPhanQuyen();
    bootstrap.Modal.getInstance(document.getElementById('modalPhanQuyen')).hide();
    hienTbao('Lưu tạm thành công. Vui lòng bấm Cập nhật hệ thống để lưu chính thức.');
  }

  function capNhatPhanQuyen() {
    if (!confirm('Hệ thống sẽ ghi đè toàn bộ danh sách phân quyền này. Đồng chí có chắc chắn tiếp tục?')) return;
    
    $("#vungTai").show();
    goiMyChuHien('luuPhanQuyen', { mangTKhoan: mangPhanQuyen, vTro: ndHtai.vTro })
      .then(q => {
        if (q.tCong) {
          hienTbao(q.tBao);
        } else {
          hienTbao(q.tBao, 'loi');
        }
        $("#vungTai").hide();
      })
      .catch(lc => { hienTbao(lc, 'loi'); $("#vungTai").hide(); });
  }
</script>
